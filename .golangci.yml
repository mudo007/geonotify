linters:
  enable:
    - gofmt
    - govet
    - errcheck       # no unchecked errors, ever
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - gocritic
    - goimports

linters-settings:
  goimports:
    local-prefixes: github.com/mudo007/geonotify

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck    # test files get a pass on errcheck