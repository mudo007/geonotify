Version: 2
formatters:
  enable:
    - gofmt
    - goimports
linters:
  enable:
    - govet
    - errcheck       # no unchecked errors, ever
    - staticcheck
    - unused
    - ineffassign
    - gocritic
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - errcheck

linters-settings:
  goimports:
    local-prefixes: github.com/mudo007/geonotify
    # test files get a pass on errcheck