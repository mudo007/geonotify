version: 2

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes: github.com/mudo007/geonotify

linters:
  enable:
    - govet
    - errcheck       # no unchecked errors, ever
    - staticcheck
    - unused
    - ineffassign
    - gocritic

issues:
  exclude-rules:
    # test files get a pass on errcheck
    - path: '_test\.go'
      linters:
        - errcheck