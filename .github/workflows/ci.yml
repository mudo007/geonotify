name: CI

on:
  push:
    branches: ["**"]          # every branch — trunk-based means main ships, but PRs still gate
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: geonotify
          POSTGRES_PASSWORD: geonotify
          POSTGRES_DB: geonotify
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgres://geonotify:geonotify@localhost:5432/geonotify?sslmode=disable
      KAFKA_BROKERS: localhost:9092   # tests will mock Kafka in early sessions
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true              # caches module download across runs

      - name: Download dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Test
        run: go test ./... -v -race -count=1 -timeout 120s

      - name: Build
        run: go build -o /dev/null ./...