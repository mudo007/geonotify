root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/api/main.go"
  # Replace 'bin = ...' with 'entrypoint = ...'
  entrypoint = ["./tmp/main"]
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", "testdata"]
  delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true